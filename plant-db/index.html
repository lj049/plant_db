                id: 24, name: "班地锦草", latin: "Euphorbia maculata L.", family: "大戟科大戟属", life: "一年生草本", 
                origin: "美洲", geo: "东亚和北美间断分布", group: "被子植物", 
                shape: "一年生草本。根纤细，茎匍匐，被白色疏柔毛。叶对生，长椭圆形至肾状长圆形，叶面绿色，中部常具有一个长圆形的紫色斑点", 
                habit: "喜光耐旱、适应性强，凭借大量种子繁殖和化感作用成为农田、草坪及荒地常见杂草", 
                harm: "入侵草坪，争水肥，覆盖影响光合作用，形成草荒", 
                area: "太极溪特大桥防护绿地", 
                count: 1,
                points: [[110.273,29.0906]]
            },
            {
                id: 25, name: "土人参", latin: "Talinum paniculatum (Jacq.) Gaertn.", family: "土人参科土人参属", life: "一年生或多年生草本", 
                origin: "美洲", geo: "热带亚洲和热带美洲间断分布", group: "被子植物", 
                shape: "全株无毛，主根粗壮，圆锥形，皮黑褐色，断面乳白色。茎直立，肉质，叶互生或近对生，叶片稍肉质，倒卵形或倒卵状长椭圆形", 
                habit: "喜温暖湿润，耐旱耐瘠，适应性强，种子繁殖，常生于村旁、山坡、荒地等", 
                harm: "管理不当易生根腐病、茎腐病，偶有斜纹夜蛾危害", 
                area: "永昌路防护绿地", 
                count: 1,
                points: []
            }
        ];

        // ===================== 2. 初始化张家界卫星地图 =====================
        let map = L.map('map').setView([29.12, 110.48], 12); // 张家界中心点
        let markers = []; // 存储点位标记

        // 加载天地图卫星影像（国内可用，无偏移）
        L.tileLayer('http://t0.tianditu.gov.cn/img_w/wmts?layer=img&style=default&tilematrixset=w&Service=WMTS&Request=GetTile&Version=1.0.0&Format=tiles&TileMatrix={z}&TileCol={x}&TileRow={y}&tk=yourkey', {
            attribution: '天地图'
        }).addTo(map);

        // ===================== 3. 搜索与渲染功能 =====================
        const searchInput = document.getElementById('searchInput');
        const searchBtn = document.getElementById('searchBtn');
        const tableBody = document.getElementById('tableBody');

        // 搜索按钮点击事件
        searchBtn.addEventListener('click', searchPlant);
        // 回车搜索
        searchInput.addEventListener('keyup', function(e) {
            if (e.key === 'Enter') searchPlant();
        });

        // 搜索植物函数
        function searchPlant() {
            const keyword = searchInput.value.trim();
            if (!keyword) {
                tableBody.innerHTML = '<tr><td colspan="14">请输入植物名称</td></tr>';
                clearMarkers();
                return;
            }

            // 筛选匹配的植物
            const result = plantData.filter(item => 
                item.name.includes(keyword) || keyword.includes(item.name)
            );

            if (result.length === 0) {
                tableBody.innerHTML = '<tr><td colspan="14">未找到该植物信息</td></tr>';
                clearMarkers();
                return;
            }

            // 渲染表格
            renderTable(result);
            // 渲染地图点位
            renderPoints(result);
        }

        // 渲染植物表格
        function renderTable(data) {
            let html = '';
            data.forEach(item => {
                html += `
                <tr>
                    <td><img src="./${item.name}.jpg" class="plant-img" alt="${item.name}" onerror="this.src='https://via.placeholder.com/80?text=无图片'"></td>
                    <td>${item.id}</td>
                    <td>${item.name}</td>
                    <td>${item.latin}</td>
                    <td>${item.family}</td>
                    <td>${item.life}</td>
                    <td>${item.origin}</td>
                    <td>${item.geo}</td>
                    <td>${item.group}</td>
                    <td style="text-align:left; padding:10px;">${item.shape}</td>
                    <td style="text-align:left; padding:10px;">${item.habit}</td>
                    <td style="text-align:left; padding:10px;">${item.harm}</td>
                    <td style="text-align:left; padding:10px;">${item.area}</td>
                    <td>${item.count}</td>
                </tr>
                `;
            });
            tableBody.innerHTML = html;
        }

        // 渲染地图点位
        function renderPoints(data) {
            clearMarkers(); // 清空旧标记
            data.forEach(item => {
                if (item.points && item.points.length > 0) {
                    item.points.forEach(point => {
                        if (point[0] && point[1]) {
                            let marker = L.marker([point[1], point[0]]).addTo(map);
                            marker.bindPopup(`<b>${item.name}</b><br>经度：${point[0]}<br>纬度：${point[1]}`);
                            markers.push(marker);
                        }
                    });
                }
            });
        }

        // 清空地图标记
        function clearMarkers() {
            markers.forEach(marker => map.removeLayer(marker));
            markers = [];
        }
    </script>
</body>
</html>
